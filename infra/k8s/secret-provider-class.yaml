apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: azure-keyvault-secrets
  namespace: trading
spec:
  provider: azure
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "true"
    userAssignedIdentityID: "{{ .Values.identity.clientId }}"
    keyvaultName: "{{ .Values.keyvault.name }}"
    tenantId: "{{ .Values.identity.tenantId }}"
    objects: |
      array:
        - |
          objectName: postgres-connection-string
          objectType: secret
          objectVersion: ""
        - |
          objectName: postgres-admin-password
          objectType: secret
          objectVersion: ""
        - |
          objectName: redis-connection-string
          objectType: secret
          objectVersion: ""
        - |
          objectName: redis-primary-access-key
          objectType: secret
          objectVersion: ""
        - |
          objectName: eventhubs-connection-string
          objectType: secret
          objectVersion: ""
        - |
          objectName: app-insights-connection-string
          objectType: secret
          objectVersion: ""
        - |
          objectName: app-insights-instrumentation-key
          objectType: secret
          objectVersion: ""
        - |
          objectName: acr-admin-username
          objectType: secret
          objectVersion: ""
        - |
          objectName: acr-admin-password
          objectType: secret
          objectVersion: ""
