apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: trading
  labels:
    app: api
    component: api-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
        component: api-gateway
    spec:
      serviceAccountName: api
      containers:
      - name: api
        image: hftacr.azurecr.io/api:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
          name: http
        - containerPort: 8080
          name: metrics
        env:
        - name: POSTGRES_DSN
          valueFrom:
            secretKeyRef:
              name: azure-keyvault-secrets
              key: postgres-connection-string
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: azure-keyvault-secrets
              key: redis-connection-string
        - name: KAFKA_BROKERS
          valueFrom:
            secretKeyRef:
              name: azure-keyvault-secrets
              key: eventhubs-connection-string
        - name: APP_INSIGHTS_CONN
          valueFrom:
            secretKeyRef:
              name: azure-keyvault-secrets
              key: app-insights-connection-string
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /api/v1/health/liveness
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /api/v1/health/readiness
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        volumeMounts:
        - name: secrets-store-inline
          mountPath: "/mnt/secrets-store"
          readOnly: true
      volumes:
      - name: secrets-store-inline
        csi:
          driver: secrets-store.csi.k8s.io
          readOnly: true
          volumeAttributes:
            secretProviderClass: "azure-keyvault-secrets"
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: trading
  labels:
    app: api
spec:
  selector:
    app: api
  ports:
  - name: http
    port: 80
    targetPort: 8000
    protocol: TCP
  - name: metrics
    port: 8080
    targetPort: 8080
    protocol: TCP
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: api-ingress
  namespace: trading
  annotations:
    kubernetes.io/ingress.class: "nginx"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
spec:
  tls:
  - hosts:
    - api.trading.example.com
    secretName: api-tls
  rules:
  - host: api.trading.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: api
            port:
              number: 80
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: api
  namespace: trading
  annotations:
    azure.workload.identity/client-id: "{{ .Values.identity.clientId }}"
